name: CI/CD Pipeline  # GitHub Actions 워크플로우의 이름

on:
  push:
    branches:
      - main  # main 브랜치에 push 이벤트가 발생했을 때 워크플로우 실행

concurrency:
  group: backend-deploy-main
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest  # 최신 Ubuntu 환경에서 작업 실행

    steps:
      - name: Checkout source
        uses: actions/checkout@v3  # GitHub 저장소의 소스코드를 가져오는 액션

      - name: Set up JDK 17
        uses: actions/setup-java@v3  # JDK 설정 액션
        with:
          java-version: '17'  # Java 17 버전 사용
          distribution: 'temurin'  # AdoptOpenJDK의 Temurin 배포판 사용

      - name: mvnw 실행 권한 부여
        run: chmod +x ./mvnw  # mvnw 파일(Wrapper)에 실행 권한 부여

      - name: Maven 빌드 실행
        run: ./mvnw clean package -DskipTests  # Maven 빌드 실행 (테스트 생략)
      # run: ./mvnw clean verify  # 테스트 포함 빌드 시 이 명령어 사용

      - name: Docker Hub 로그인
        uses: docker/login-action@v3  # Docker Hub에 로그인하는 액션
        with:
          username: ${{ secrets.DOCKER_USERNAME }}  # GitHub에 저장된 시크릿 값 사용
          password: ${{ secrets.DOCKER_ACCESS_TOKEN }}

      - name: Docker 이미지 빌드
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/jwt-app:latest .  # 애플리케이션을 도커 이미지로 빌드

      - name: Docker 이미지 푸시
        run: docker push ${{ secrets.DOCKER_USERNAME }}/jwt-app:latest  # 빌드한 이미지를 Docker Hub에 업로드

      - name: EC2에서 docker-compose 실행
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.EC2_PRIVATE_KEY }}" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          ssh \
            -i ~/.ssh/ec2_key \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o ConnectTimeout=20 \
            -o ServerAliveInterval=10 \
            -o ServerAliveCountMax=3 \
            "${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }}" <<'REMOTE'
          set -e
          mkdir -p ~/cicd-docker
          cd ~/cicd-docker  # 도커 파일이 위치한 경로로 이동
          cat > .env <<EOF
          SPRING_JWT_SECRET=${{ secrets.SPRING_JWT_SECRET }}
          MYSQL_URL=jdbc:mysql://mysql_db:3306/jwt_db?characterEncoding=UTF-8
          MYSQL_USER=${{ secrets.MYSQL_USER }}
          MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}
          DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
          EOF
          cat > docker-compose.yml <<'EOF'
          services:
            springboot-app:
              image: ${DOCKER_USERNAME}/jwt-app:latest
              container_name: jwt_app
              restart: unless-stopped
              ports:
                - "8080:8080"
              environment:
                SPRING_JWT_SECRET: ${SPRING_JWT_SECRET}
                MYSQL_URL: ${MYSQL_URL}
                MYSQL_USER: ${MYSQL_USER}
                MYSQL_PASSWORD: ${MYSQL_PASSWORD}
                JAVA_TOOL_OPTIONS: "-Duser.timezone=Asia/Seoul -Dfile.encoding=UTF-8"
                SPRING_PROFILES_ACTIVE: prod
              networks:
                - mynet
          networks:
            mynet:
              external: true
          EOF
          for i in 1 2 3; do
            timeout 90s docker pull ${{ secrets.DOCKER_USERNAME }}/jwt-app:latest && break
            if [ "$i" = "3" ]; then exit 1; fi
            sleep 15
          done  # 최신 이미지 가져오기: Docker Hub TLS timeout 대비 재시도
          timeout 30s docker compose down || true  # 기존 컨테이너 종료
          timeout 60s docker compose up -d  # 백그라운드로 새 컨테이너 실행
          sleep 90  # Spring Boot와 DB 연결 초기화 대기
          timeout 20s docker compose ps
          timeout 20s docker compose ps springboot-app | grep -q "Up" || (timeout 20s docker compose logs --tail=120 springboot-app && exit 1)
          REMOTE

      # Slack 알림 - 성공 시
      - name: Notify to Slack on Success
        if: success()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_USERNAME: GitHub Actions
          SLACK_ICON_EMOJI: ':rocket:'
          SLACK_TITLE: '✅ 배포 성공'
          SLACK_MESSAGE: 'Main 브랜치에 push됨 → EC2에 성공적으로 배포되었습니다-추카추카! 🎉'
          SLACK_COLOR: good

      # Slack 알림 - 실패 시
      - name: Notify to Slack on Failure
        if: failure()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}  # Slack에서 생성한 Webhook URL (GitHub Secrets로 관리)
          SLACK_USERNAME: GitHub Actions                   # Slack에 표시될 발신자 이름
          SLACK_ICON_EMOJI: ':x:'                          # Slack 메시지 앞에 표시될 아이콘 (실패용 이모지)
          SLACK_TITLE: '❌ 배포 실패'                        # Slack 메시지의 제목 (굵은 텍스트로 표시됨)
          SLACK_MESSAGE: 'Main 브랜치에 push됨 → EC2 배포 중 오류가 발생했습니다. 🔥 확인이 필요합니다.'  # Slack 메시지의 본문 내용 (상세 메시지)
          SLACK_COLOR: danger                              # 메시지 바 색상 (green=good, red=danger, yellow=warning)

